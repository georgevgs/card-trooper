<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Card Trooper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #FBF9F6;
            color: #262322;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            text-align: center;
            padding: 2.5rem 2rem;
            background: #FFFFFF;
            border-radius: 24px;
            border: 1px solid #F0EAE1;
            box-shadow: 0 12px 26px -18px rgba(60,45,35,0.35);
            max-width: 300px;
            width: 90%;
        }
        .bolt { margin-bottom: 16px; }
        h1 { font-size: 20px; font-weight: 800; margin: 0 0 6px; }
        p  { font-size: 14px; font-weight: 500; color: #7A7168; margin: 0 0 20px; line-height: 1.5; }
        button {
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: #F0553D;
            border: none;
            border-radius: 16px;
            padding: 12px 26px;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #D8452F; }
    </style>
</head>
<body>
    <div class="card">
        <div class="bolt">
            <svg width="36" height="53" viewBox="0 0 60 88" fill="none">
                <path d="M44 0L16 48h28z" fill="#F0553D" />
                <path d="M16 40h28L16 88z" fill="#8B5E3C" />
                <path d="M21 40h23L39 48H16z" fill="#262322" />
            </svg>
        </div>
        <h1>You're offline</h1>
        <p>Check your connection and try again.</p>
        <button onclick="window.location.reload()">Retry</button>
    </div>
</body>
</html>
