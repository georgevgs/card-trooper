<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- iOS 26 app icon master: full-bleed square, no baked corner radius —
       the system applies the squircle mask and glass treatment. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7B5C"/>
      <stop offset="1" stop-color="#E8442C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.16" r="0.8">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8C1E08" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8C1E08" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt" x1="30" y1="0" x2="30" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE4DB"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Soft ground shadow under the glyph -->
  <ellipse cx="512" cy="806" rx="250" ry="72" fill="url(#shadow)"/>

  <!-- Ghost bolt: translucent glass layer behind the mark -->
  <g transform="translate(353, 207.6) scale(6.1)" fill="#FFFFFF" opacity="0.22">
    <path d="M44 0L16 48h28z"/>
    <path d="M16 40h28L16 88z"/>
  </g>

  <!-- Brand bolt -->
  <g transform="translate(305, 243.6) scale(6.1)">
    <path d="M44 0L16 48h28z" fill="url(#bolt)"/>
    <path d="M16 40h28L16 88z" fill="url(#bolt)"/>
    <path d="M21 40h23L39 48H16z" fill="#E8442C" fill-opacity="0.28"/>
  </g>
</svg>
